name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    name: Build, formato y pruebas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restaurar dependencias
        run: dotnet restore Bep.slnx

      - name: Verificar formato (linters/estilo, RNF-MANT-003)
        run: dotnet format Bep.slnx --verify-no-changes --no-restore

      - name: Compilar
        run: dotnet build Bep.slnx --configuration Release --no-restore

      # Las pruebas de integración usan Testcontainers; el runner de GitHub trae
      # Docker disponible, por lo que el test de aislamiento RLS se ejecuta aquí.
      - name: Pruebas (con cobertura, RNF-MANT-001)
        run: >
          dotnet test Bep.slnx
          --configuration Release
          --no-build
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults

      - name: Publicar resultados de cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: ./TestResults/**/coverage.cobertura.xml
          if-no-files-found: ignore

  vulnerability-scan:
    name: Escaneo de dependencias vulnerables
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Restaurar
        run: dotnet restore Bep.slnx
      - name: Buscar paquetes vulnerables (RNF-SEG-006)
        run: |
          dotnet list Bep.slnx package --vulnerable --include-transitive 2>&1 | tee vuln.txt
          ! grep -q -E "Crítica|Critical|Alta|High" vuln.txt
