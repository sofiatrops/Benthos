# Entorno de desarrollo / MVP de BEP (SRS 2.8.4, ADR-001).
# Orquesta: base de datos, IdP, almacenamiento de objetos, API y Worker.
# Uso: cp .env.example .env && docker compose up -d

name: bep

services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bep}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-bep}"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    # Importa el realm 'bep' (cliente, roles, mappers de claims y usuarios de
    # prueba) en el primer arranque; idempotente en arranques posteriores.
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - ./docker/keycloak:/opt/keycloak/data/import:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 10s
      timeout: 5s
      retries: 12

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      BEP_DB_CONNECTION: ${BEP_DB_CONNECTION:-Host=postgres;Port=5432;Database=bep;Username=bep_app;Password=bep_app_dev}
      Keycloak__Authority: ${KEYCLOAK_AUTHORITY:-http://keycloak:8080/realms/bep}
      Keycloak__Audience: ${KEYCLOAK_AUDIENCE:-bep-api}
      Keycloak__RequireHttpsMetadata: "false"
      ObjectStorage__ServiceUrl: ${OBJECTSTORAGE_SERVICEURL:-http://minio:9000}
      ObjectStorage__Bucket: ${OBJECTSTORAGE_BUCKET:-bep}
      ObjectStorage__AccessKey: ${MINIO_ROOT_USER:-minioadmin}
      ObjectStorage__SecretKey: ${MINIO_ROOT_PASSWORD:-minioadmin}
      ObjectStorage__ForcePathStyle: "true"
      ObjectStorage__CrearBucketSiNoExiste: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
      minio:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    environment:
      DOTNET_ENVIRONMENT: Development
      BEP_DB_CONNECTION: ${BEP_DB_CONNECTION:-Host=postgres;Port=5432;Database=bep;Username=bep_app;Password=bep_app_dev}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
  minio-data:
